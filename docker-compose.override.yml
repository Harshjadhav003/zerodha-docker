version: "3.8"

services:
  backend:
    build: ../backend
    volumes:
      - ../backend:/app
      - /app/node_modules
    command: npm run dev

  frontend:
    build: ../frontend
    volumes:
      - ../frontend:/app
      - /app/node_modules
    command: npm run dev

  dashboard:
    build: ../dashboard
    volumes:
      - ../dashboard:/app
      - /app/node_modules
    command: npm run dev